<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이거 뭐냐?</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 26px;
  font-weight: 900;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  width: 70%;
}

.product-card {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 12px;
}

.product-card img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>이거 뭐냐? 🤔</h1>
<p>이름 몰라도 찍으면 찾는다 🔥</p>

<br>

<input id="searchInput" placeholder="예: 인스타 후드티">
<button onclick="search()">찾아줘</button>

<br><br>

<button onclick="camera()">📸 이거 찍어봐</button>
<button onclick="gallery()">🖼 사진 가져오기</button>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" style="display:none">

<p id="status"></p>

<div id="results"></div>

<script>
const API_BASE_URL = "https://ai-server-eohq.onrender.com";

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

async function search() {
  const query = document.getElementById("searchInput").value;

  setStatus("AI가 열심히 찾는 중 🔍");

  const res = await fetch(API_BASE_URL + "/search", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({query})
  });

  const data = await res.json();
  render(data.products);
}

function camera() {
  document.getElementById("cameraInput").click();
}

function gallery() {
  document.getElementById("galleryInput").click();
}

document.getElementById("cameraInput").onchange = sendImage;
document.getElementById("galleryInput").onchange = sendImage;

async function sendImage(e) {
  const file = e.target.files[0];

  const formData = new FormData();
  formData.append("image", file);

  setStatus("이거 뭐냐 분석중 👀");

  const res = await fetch(API_BASE_URL + "/analyze", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  render(data.products);
}

function render(products) {
  const container = document.getElementById("results");

  if (!products || products.length === 0) {
    container.innerHTML = "<p>이건 애매하다... 비슷한 거 찾아줄까? 😏</p>";
    return;
  }

  container.innerHTML = "";

  products.forEach((p, i) => {
    const best = i === 0;

    container.innerHTML += `
      <div class="product-card" style="${best ? 'border:2px solid blue;' : ''}">
        ${best ? '<p>🔥 가장 비슷한 거</p>' : ''}
        <img src="${p.image}">
        <p><b>${p.title}</b></p>
        <p>${p.description}</p>
        <p>${p.price}</p>
        <button onclick="window.open('${p.link}')">🛒 보러가기</button>
      </div>
    `;
  });

  container.innerHTML += `
    <button style="margin-top:10px; width:100%;">
      📤 이거 맞냐 친구한테 보내기 ㅋㅋ
    </button>
  `;
}
</script>

</body>
</html>
