<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>이거 뭐냐?</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #101828;
      --sub: #667085;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #0f172a;
      --chip: #eef4ff;
      --chip-text: #2457ff;
      --soft: #f8fafc;
      --danger: #ef4444;
      --good: #16a34a;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    body {
      font-family: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .app {
      padding-bottom: 40px;
    }

    .topbar {
      background: white;
      padding: 22px 16px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo-wrap h1 {
      font-size: 1.9rem;
      font-weight: 900;
      line-height: 1.1;
      color: #0b1f44;
      letter-spacing: -0.03em;
    }

    .logo-wrap p {
      margin-top: 6px;
      color: var(--sub);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .icon-btn {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 16px;
      background: #eef2ff;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .section {
      background: var(--card);
      margin: 12px 12px 0;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .hero-title {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: -0.04em;
      color: #0b1f44;
    }

    .hero-sub {
      margin-top: 10px;
      color: var(--sub);
      font-size: 1rem;
      line-height: 1.55;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .search-input {
      flex: 1;
      height: 54px;
      border: 1.5px solid #d0d5dd;
      border-radius: 16px;
      padding: 0 16px;
      font-size: 1rem;
      outline: none;
      background: white;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .search-btn {
      min-width: 86px;
      height: 54px;
      border: none;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .big-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 12px;
    }

    .camera-btn {
      background: #0b1730;
      color: white;
    }

    .gallery-btn {
      background: #3a465c;
      color: white;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.45rem;
      font-weight: 900;
      color: #0b1f44;
      margin-bottom: 14px;
      letter-spacing: -0.03em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--chip);
      color: var(--chip-text);
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .recent-empty {
      color: var(--sub);
      font-size: 0.98rem;
      padding: 4px 0 2px;
    }

    .status-box {
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 0.98rem;
      font-weight: 700;
      display: none;
    }

    .status-box.show {
      display: block;
    }

    .status-loading {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .status-error {
      background: #fef2f2;
      color: #b91c1c;
    }

    .status-success {
      background: #f0fdf4;
      color: #15803d;
    }

    .result-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .result-head-text h3 {
      font-size: 1.4rem;
      font-weight: 900;
      color: #0b1f44;
      margin-bottom: 6px;
    }

    .result-head-text p {
      color: var(--sub);
      line-height: 1.5;
      font-size: 0.97rem;
    }

    .badge {
      background: #eef4ff;
      color: #2457ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .empty-result {
      text-align: center;
      color: var(--sub);
      padding: 26px 10px 16px;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .product-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    .product-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #eef2f7;
      object-fit: cover;
      display: block;
    }

    .product-body {
      padding: 14px;
    }

    .product-title {
      font-size: 1.03rem;
      font-weight: 900;
      color: #111827;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .product-desc {
      color: var(--sub);
      font-size: 0.92rem;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .price {
      font-size: 1.18rem;
      font-weight: 900;
      color: #0b1f44;
    }

    .mini-badge {
      background: #f3f4f6;
      color: #374151;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      height: 46px;
      border: none;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn-buy {
      background: var(--primary);
      color: white;
    }

    .btn-save {
      background: #f3f4f6;
      color: #111827;
    }

    .share-btn {
      width: 100%;
      margin-top: 14px;
      background: #111827;
      color: white;
      height: 48px;
      border: none;
      border-radius: 14px;
      font-size: 0.98rem;
      font-weight: 900;
      cursor: pointer;
    }

    .ad-box {
      margin-top: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #dbeafe, #eef2ff);
      border: 1px dashed #93c5fd;
      padding: 16px;
    }

    .ad-label {
      display: inline-block;
      background: white;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.76rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .ad-title {
      font-size: 1.05rem;
      font-weight: 900;
      color: #0b1f44;
      margin-bottom: 6px;
    }

    .ad-text {
      color: #334155;
      line-height: 1.45;
      font-size: 0.93rem;
    }

    .footer-space {
      height: 24px;
    }

    .hidden-input {
      display: none;
    }

    @media (max-width: 400px) {
      .hero-title {
        font-size: 1.7rem;
      }

      .search-btn {
        min-width: 74px;
        font-size: 0.95rem;
      }

      .logo-wrap h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo-wrap">
        <h1>이거 뭐냐? 🤔</h1>
        <p>이름 몰라도 찍으면 바로 찾는다 🔥</p>
      </div>
      <button class="icon-btn" aria-label="설정">⚙️</button>
    </header>

    <section class="section">
      <h2 class="hero-title">사진으로 찾고<br />바로 쇼핑하자</h2>
      <p class="hero-sub">
        친구가 입은 옷, 인스타에서 본 신발, 이름 모르는 물건까지
        바로 찾아볼 수 있어 👀
      </p>

      <div class="search-row">
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="예: 인스타 후드티, 요즘 유행 신발"
        />
        <button id="searchBtn" class="search-btn">찾아줘</button>
      </div>

      <button id="cameraBtn" class="big-btn camera-btn">📸 이거 찍어봐</button>
      <button id="galleryBtn" class="big-btn gallery-btn">🖼 사진 가져오기</button>

      <input
        id="cameraInput"
        class="hidden-input"
        type="file"
        accept="image/*"
        capture="environment"
      />
      <input
        id="galleryInput"
        class="hidden-input"
        type="file"
        accept="image/*"
      />

      <div id="statusBox" class="status-box"></div>
    </section>

    <section class="section">
      <h3 class="section-title">🔥 인기 검색</h3>
      <div class="chips" id="popularKeywords">
        <button class="chip">인스타 감성 후드티</button>
        <button class="chip">요즘 유행 신발</button>
        <button class="chip">연예인 착장</button>
        <button class="chip">교복 위에 입는 후드</button>
        <button class="chip">남친룩 코디</button>
        <button class="chip">여친룩 코디</button>
        <button class="chip">블루투스 이어폰</button>
        <button class="chip">게이밍 마우스</button>
      </div>
    </section>

    <section class="section">
      <h3 class="section-title">🕘 최근 검색</h3>
      <div id="recentSearchesWrap" class="recent-empty">아직 최근 검색이 없어</div>
    </section>

    <section class="section">
      <div class="result-head">
        <div class="result-head-text">
          <h3>🛍 검색 결과</h3>
          <p>이거 궁금했지? 비슷한 거 찾아왔다 👇</p>
        </div>
        <div class="badge" id="resultBadge">10대 추천 모드</div>
      </div>

      <div id="resultsContainer">
        <div class="empty-result">검색을 시작해봐 😎</div>
      </div>

      <div class="ad-box">
        <div class="ad-label">광고 자리</div>
        <div class="ad-title">여기에 광고 들어가도 자연스럽게 보이게</div>
        <div class="ad-text">
          나중에 애드몹이나 제휴 배너 붙일 자리로 쓰면 돼. 지금은 디자인만 잡아둔 상태.
        </div>
      </div>
    </section>

    <div class="footer-space"></div>
  </div>

  <script>
    const API_BASE_URL = "https://ai-server-eohq.onrender.com";

    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const galleryBtn = document.getElementById("galleryBtn");
    const cameraInput = document.getElementById("cameraInput");
    const galleryInput = document.getElementById("galleryInput");
    const statusBox = document.getElementById("statusBox");
    const resultsContainer = document.getElementById("resultsContainer");
    const recentSearchesWrap = document.getElementById("recentSearchesWrap");
    const popularKeywords = document.getElementById("popularKeywords");

    const RECENT_KEY = "teen_shop_recent_searches";
    const SAVED_KEY = "teen_shop_saved_items";

    function showStatus(message, type = "loading") {
      statusBox.className = "status-box show";
      if (type === "loading") statusBox.classList.add("status-loading");
      if (type === "error") statusBox.classList.add("status-error");
      if (type === "success") statusBox.classList.add("status-success");
      statusBox.textContent = message;
    }

    function hideStatus() {
      statusBox.className = "status-box";
      statusBox.textContent = "";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatPrice(value) {
      if (!value) return "가격 정보 없음";
      const num = Number(String(value).replace(/[^\d]/g, ""));
      if (Number.isNaN(num) || num <= 0) return String(value);
      return "₩" + num.toLocaleString("ko-KR");
    }

    function loadRecentSearches() {
      const items = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");

      if (!items.length) {
        recentSearchesWrap.className = "recent-empty";
        recentSearchesWrap.textContent = "아직 최근 검색이 없어";
        return;
      }

      recentSearchesWrap.className = "chips";
      recentSearchesWrap.innerHTML = items
        .map((item) => `<button class="chip recent-chip">${escapeHtml(item)}</button>`)
        .join("");
    }

    function saveRecentSearch(keyword) {
      if (!keyword || !keyword.trim()) return;
      const clean = keyword.trim();

      let items = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
      items = [clean, ...items.filter((v) => v !== clean)].slice(0, 8);
      localStorage.setItem(RECENT_KEY, JSON.stringify(items));
      loadRecentSearches();
    }

    function saveItem(product) {
      let saved = JSON.parse(localStorage.getItem(SAVED_KEY) || "[]");
      const exists = saved.some((item) => item.title === product.title && item.link === product.link);

      if (exists) {
        showStatus("이미 찜해둔 상품이야 😎", "success");
        setTimeout(hideStatus, 1800);
        return;
      }

      saved.unshift(product);
      localStorage.setItem(SAVED_KEY, JSON.stringify(saved.slice(0, 30)));
      showStatus("찜해뒀다 💾", "success");
      setTimeout(hideStatus, 1800);
    }

    function renderProducts(products, keyword = "") {
      if (!Array.isArray(products) || products.length === 0) {
        resultsContainer.innerHTML = `
          <div class="empty-result">이거 못 찾았다... 다시 찍어봐 😅</div>
        `;
        return;
      }

      const cardsHtml = products.map((item, index) => {
        const title = item.title || item.name || `추천 상품 ${index + 1}`;
        const desc = item.description || item.reason || "비슷한 스타일로 골라봤어";
        const price = formatPrice(item.price || item.price_text || item.amount);
        const image =
          item.image ||
          item.imageUrl ||
          item.thumbnail ||
          "https://placehold.co/600x600?text=Item";
        const link = item.link || item.url || "#";
        const badge = item.badge || "비슷한 느낌";

        return `
          <div class="product-card">
            <img class="product-thumb" src="${escapeHtml(image)}" alt="${escapeHtml(title)}" />
            <div class="product-body">
              <div class="product-title">${escapeHtml(title)}</div>
              <div class="product-desc">${escapeHtml(desc)}</div>
              <div class="price-row">
                <div class="price">${escapeHtml(price)}</div>
                <div class="mini-badge">${escapeHtml(badge)}</div>
              </div>
              <div class="actions">
                <button
                  class="btn btn-save"
                  onclick='handleSave(${JSON.stringify({
                    title,
                    description: desc,
                    price,
                    image,
                    link
                  })})'
                >
                  💾 찜
                </button>
                <button
                  class="btn btn-buy"
                  onclick="window.open('${escapeHtml(link)}', '_blank')"
                >
                  🛒 보러가기
                </button>
              </div>
            </div>
          </div>
        `;
      }).join("");

      resultsContainer.innerHTML = `
        <div class="cards">${cardsHtml}</div>
        <button class="share-btn" onclick="shareCurrentResult('${escapeHtml(keyword)}')">
          📤 친구한테 이거 맞냐 보내기 ㅋㅋ
        </button>
      `;
    }

    window.handleSave = function(product) {
      saveItem(product);
    };

    window.shareCurrentResult = async function(keyword) {
      const text = keyword
        ? `이거 봐봐 ㅋㅋ "${keyword}" 비슷한 거 찾음`
        : "이거 뭐냐 앱에서 비슷한 거 찾음 ㅋㅋ";

      if (navigator.share) {
        try {
          await navigator.share({
            title: "이거 뭐냐?",
            text
          });
        } catch (e) {}
      } else {
        try {
          await navigator.clipboard.writeText(text);
          showStatus("공유 문구 복사 완료 ㅋㅋ", "success");
          setTimeout(hideStatus, 1800);
        } catch (e) {
          showStatus("공유 실패... 복사는 못 했어", "error");
          setTimeout(hideStatus, 1800);
        }
      }
    };

    async function searchByText(keyword) {
      const cleanKeyword = keyword.trim();
      if (!cleanKeyword) {
        showStatus("검색어를 입력해봐 👀", "error");
        setTimeout(hideStatus, 1800);
        return;
      }

      saveRecentSearch(cleanKeyword);
      showStatus("찾는 중... 잠깐만 🔍", "loading");

      try {
        const res = await fetch(`${API_BASE_URL}/search`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ query: cleanKeyword })
        });

        if (!res.ok) {
          throw new Error("검색 요청 실패");
        }

        const data = await res.json();

        const products =
          data.products ||
          data.items ||
          data.results ||
          [];

        renderProducts(products, cleanKeyword);
        showStatus("찾았다 🔥", "success");
        setTimeout(hideStatus, 1400);
      } catch (error) {
        console.error(error);

        resultsContainer.innerHTML = `
          <div class="empty-result">검색은 들어갔는데 결과를 못 불러왔어 😢</div>
        `;

        showStatus("서버 연결이나 /search 라우트 확인해봐!", "error");
      }
    }

    async function searchByImage(file) {
      if (!file) return;

      showStatus("사진 분석 중... 이거 뭐냐 찾아보는 중 📸", "loading");

      const formData = new FormData();
      formData.append("image", file);

      try {
        const res = await fetch(`${API_BASE_URL}/analyze`, {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          throw new Error("이미지 분석 실패");
        }

        const data = await res.json();

        const detectedName =
          data.detectedName ||
          data.keyword ||
          data.query ||
          data.name ||
          "이거";

        const products =
          data.products ||
          data.items ||
          data.results ||
          [];

        saveRecentSearch(detectedName);
        renderProducts(products, detectedName);

        showStatus(`"${detectedName}" 비슷한 거 찾아왔다 👀`, "success");
        setTimeout(hideStatus, 1600);
      } catch (error) {
        console.error(error);

        resultsContainer.innerHTML = `
          <div class="empty-result">사진은 들어갔는데 결과를 못 불러왔어 😢</div>
        `;

        showStatus("서버 연결이나 /analyze 라우트 확인해봐!", "error");
      }
    }

    searchBtn.addEventListener("click", () => {
      searchByText(searchInput.value);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchByText(searchInput.value);
      }
    });

    cameraBtn.addEventListener("click", () => cameraInput.click());
    galleryBtn.addEventListener("click", () => galleryInput.click());

    cameraInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (file) searchByImage(file);
      e.target.value = "";
    });

    galleryInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (file) searchByImage(file);
      e.target.value = "";
    });

    popularKeywords.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      const keyword = chip.textContent.trim();
      searchInput.value = keyword;
      searchByText(keyword);
    });

    recentSearchesWrap.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      const keyword = chip.textContent.trim();
      searchInput.value = keyword;
      searchByText(keyword);
    });

    loadRecentSearches();
  </script>
</body>
</html>
